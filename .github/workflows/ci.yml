name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # live_*.rs integration tests are #[ignore]d by default (see CLAUDE.md)
      # and require a real running LLM server, so the default `cargo test`
      # filter already excludes them here.
      - run: cargo test

  # A single required status check for branch protection to depend on,
  # rather than requiring fmt/clippy/test individually (easy to forget one
  # when configuring protected-branch settings, which would let that job's
  # failures silently stop blocking merges).
  ci-passed:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    if: always()
    steps:
      - run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "one or more required jobs failed"
            exit 1
          fi
